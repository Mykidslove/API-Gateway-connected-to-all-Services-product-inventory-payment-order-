spring.application.name=ApiGateway

server.port=8080

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Product Service route
spring.cloud.gateway.server.webmvc.routes[0].id=product-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://PRODUCTSERVICE
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/products/**

# Order Service route
spring.cloud.gateway.server.webmvc.routes[1].id=order-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://ORDERSERVICE
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/orders/**


# Inventory Service route
spring.cloud.gateway.server.webmvc.routes[2].id=inventory-service
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://INVENTORYSERVICE
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/inventory/**

#PaymentService
spring.cloud.gateway.server.webmvc.routes[3].id=payment-service
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://PAYMENTSERVICE
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/payments/**


